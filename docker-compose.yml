services:

  # ── Banco de dados ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-senha123}
      POSTGRES_DB:       ${POSTGRES_DB:-ecommerce}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecommerce} -d ${POSTGRES_DB:-ecommerce}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ── Aplicação Next.js ───────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce_app
    restart: unless-stopped
    environment:
      DATABASE_URL:      postgresql://${POSTGRES_USER:-ecommerce}:${POSTGRES_PASSWORD:-senha123}@postgres:5432/${POSTGRES_DB:-ecommerce}
      NEXTAUTH_SECRET:   ${NEXTAUTH_SECRET}
      NEXTAUTH_URL:      ${NEXTAUTH_URL:-http://localhost}
      ASAAS_API_KEY:     ${ASAAS_API_KEY:-}
      ASAAS_ENV:         ${ASAAS_ENV:-sandbox}
    volumes:
      # Bind mount: arquivos ficam no host, sobrevivem a rebuilds
      # O nginx também acessa essa mesma pasta diretamente
      - /www/wwwroot/ecommerce/public/uploads:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - external

  # ── Nginx (reverse proxy + SSL-ready) ──────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: ecommerce_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      # Mesma pasta de uploads — nginx serve estático sem passar pelo Next.js
      - /www/wwwroot/ecommerce/public/uploads:/www/uploads:ro
    depends_on:
      - app
    networks:
      - external

volumes:
  postgres_data:
  # uploads_data removido — substituído por bind mount acima

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
