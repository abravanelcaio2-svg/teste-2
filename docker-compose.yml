services:

  # ── Banco de dados ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: loja_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-loja}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Loja2025@Prod}
      POSTGRES_DB:       ${POSTGRES_DB:-loja}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-loja} -d ${POSTGRES_DB:-loja}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ── Aplicação Next.js ───────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: loja_app
    restart: unless-stopped
    environment:
      DATABASE_URL:    postgresql://${POSTGRES_USER:-loja}:${POSTGRES_PASSWORD:-Loja2025@Prod}@postgres:5432/${POSTGRES_DB:-loja}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL:    ${NEXTAUTH_URL:-https://pietset.com}
      ASAAS_API_KEY:   ${ASAAS_API_KEY:-}
      ASAAS_ENV:       ${ASAAS_ENV:-sandbox}
    volumes:
      - /www/wwwroot/loja/public/uploads:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - external

  # ── Nginx (reverse proxy + SSL) ─────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: loja_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - /www/wwwroot/loja/public/uploads:/www/uploads:ro
    depends_on:
      - app
    networks:
      - external

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
